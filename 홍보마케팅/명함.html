<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공주님 클럽 — 구인 명함</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Hahmlet:wght@500;700;800&family=Noto+Sans+KR:wght@400;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#08060d;min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:20px;padding:36px 16px;font-family:'Noto Sans KR',sans-serif}
  .savebtn{position:fixed;top:10px;right:12px;z-index:99;background:linear-gradient(90deg,#ff5ea0,#ffcf5a);color:#1a1020;border:none;border-radius:10px;padding:10px 16px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR'}
  .savebtn:disabled{opacity:.6;cursor:wait}
  .hint{color:#6f688c;font-size:12px}

  .card{
    width:940px; height:540px; position:relative; overflow:hidden; border-radius:18px;
    background:
      radial-gradient(500px 300px at 88% 10%, rgba(255,94,160,.20), transparent 60%),
      radial-gradient(500px 300px at 6% 95%, rgba(255,207,90,.14), transparent 60%),
      linear-gradient(160deg,#170b1c 0%, #0c0712 60%, #120a17 100%);
    border:1px solid #3a2440; box-shadow:0 0 60px rgba(255,60,150,.18);
    color:#fff; padding:44px 50px;
  }
  .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:8px;background:linear-gradient(180deg,#ff5ea0,#ffcf5a)}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand .kr{font-family:'Black Han Sans';font-size:30px;background:linear-gradient(90deg,#ff5ea0,#ffcf5a);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 5px rgba(0,0,0,.5))}
  .brand .en{color:#9a8fb0;font-size:13px;letter-spacing:4px;font-weight:700}

  .hook{margin-top:26px;font-family:'Hahmlet',serif;font-weight:800;font-size:52px;line-height:1.12;color:#fff;text-shadow:0 0 14px rgba(255,46,134,.55)}
  .hook .pink{color:#ff77b4}
  .hook .gold{color:#ffcf5a}
  .sat{margin-top:12px;color:#ffd6e8;font-size:19px;font-style:italic;opacity:.9}

  .tags{position:absolute;left:50px;bottom:96px;display:flex;gap:8px;flex-wrap:wrap}
  .tag{border:1px solid #ff5ea0;color:#ff9ec6;border-radius:999px;padding:5px 12px;font-size:13px;font-weight:700}

  .contact{position:absolute;right:44px;bottom:40px;text-align:right}
  .contact .lbl{color:#9a8fb0;font-size:13px;letter-spacing:1px}
  .contact .num{font-family:'Black Han Sans';font-size:38px;background:linear-gradient(90deg,#ffcf5a,#ff5ea0);-webkit-background-clip:text;background-clip:text;color:transparent}
  .contact .who{color:#ffd6e8;font-size:14px;margin-top:2px}

  .cheeky{position:absolute;left:50px;bottom:44px;color:#8a7fa0;font-size:13px}
  .cheeky b{color:#ff9ec6}
</style>
</head>
<body>
  <button class="savebtn" id="saveBtn">🖼️ 이미지로 저장 (PNG)</button>

  <div class="card" id="card">
    <div class="brand"><span class="kr">공주님 클럽</span><span class="en">PRINCESS CLUB · CLIMAX</span></div>

    <div class="hook">일 안 하고 돈 벌고 싶은 <span class="pink">언니?</span><br>앉아서 4시간 <span class="gold">180만+</span></div>
    <div class="sat">팁은 전액 네 거(+@) · 출근 자유 · 당일 정산 · 초보 환영</div>

    <div class="tags">
      <span class="tag">👑 공주님 상시 구인</span>
      <span class="tag">강요 없음 · 거부권 보장</span>
      <span class="tag">고페이 보장</span>
    </div>

    <div class="cheeky">여성 전용 모집 · <b>꽈추는 ㄲㅈ 😉</b></div>

    <div class="contact">
      <div class="lbl">문의 · 문자 / 전화</div>
      <div class="num">010-4499-3016</div>
      <div class="who">사장 ) 시진핑</div>
    </div>
  </div>

  <div class="hint">저장이 안 되면 Win+Shift+S 캡쳐</div>

  <script type="module">
    import { toPng } from 'https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/+esm'
    const btn = document.getElementById('saveBtn')
    btn.addEventListener('click', async () => {
      btn.disabled = true; const label = btn.textContent; btn.textContent = '만드는 중…'
      try {
        await document.fonts.ready
        await new Promise(r => setTimeout(r, 200))
        const url = await toPng(document.getElementById('card'), { pixelRatio: 3, cacheBust: true, backgroundColor: '#08060d' })
        const a = document.createElement('a'); a.href = url; a.download = '공주님클럽_구인명함.png'; a.click()
      } catch (e) { alert('저장 실패: ' + e.message + '\n\nWin+Shift+S 캡쳐를 사용하세요.') }
      btn.disabled = false; btn.textContent = label
    })
  </script>
</body>
</html>
