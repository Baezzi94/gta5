<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모텔 임대 수익 계산기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0b0b0e;--panel:#141319;--panel2:#1b1a22;--line:#2a2833;--gold:#ffcf5a;--pink:#ff5ea0;--green:#5ee0a0;--red:#ff7b7b;--blue:#6ec7ff;--tx:#f2f0f6;--dim:#a49fb0;--dim2:#6f6a7d}
  body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;line-height:1.6;padding:34px 16px}
  .wrap{max-width:860px;margin:0 auto}
  .kicker{color:var(--gold);letter-spacing:4px;font-size:12px;font-weight:700}
  h1{font-family:'Black Han Sans',sans-serif;font-size:32px;margin:6px 0 4px}
  .sub{color:var(--dim);font-size:14px;margin-bottom:24px}

  .calc{background:linear-gradient(180deg,rgba(255,94,160,.04),rgba(0,0,0,0)),var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px}
  .calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  @media(max-width:780px){.calc-grid{grid-template-columns:1fr}}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;color:var(--dim);margin-bottom:6px}
  .field label .cur{float:right;color:var(--gold);font-weight:700}
  .field input[type=number]{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:#0e0d12;color:var(--tx);font-size:15px;font-family:inherit}
  .field input[type=range]{width:100%;accent-color:var(--pink);margin-top:8px}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;padding:9px;border-radius:9px;border:1px solid var(--line);background:#0e0d12;color:var(--dim);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;min-width:56px}
  .seg button.on{background:var(--pink);color:#160a11;border-color:var(--pink)}
  .inline2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .out{background:#0e0d12;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
  .out .big{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0}
  .out .big .lab{color:var(--dim);font-size:13px}
  .out .big .num{font-family:'Black Han Sans',sans-serif;font-size:30px}
  .out .row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px;border-top:1px solid var(--line)}
  .out .row .lab{color:var(--dim)}
  .pos{color:var(--green)} .neg{color:var(--red)}

  .pricelist{width:100%;border-collapse:collapse;font-size:14px}
  .pricelist th,.pricelist td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:right}
  .pricelist th:first-child,.pricelist td:first-child{text-align:left}
  .pricelist thead th{color:var(--dim);font-size:12px}
  .pricelist .tier{font-weight:700} .pricelist .hrs{color:var(--dim2);font-size:12px}
  .pricelist tr.primary{background:rgba(255,94,160,.08)} .pricelist tr.primary .tier{color:var(--pink)}
  .badge{font-size:10px;background:var(--pink);color:#160a11;border-radius:5px;padding:1px 6px;font-weight:800;margin-left:6px}

  .subpanel{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:14px}
  .subpanel .h{font-size:13px;color:var(--blue);font-weight:800;letter-spacing:1px;margin-bottom:10px}
  .reverse{background:var(--panel2);border:1px dashed #4a4356;border-radius:12px;padding:16px;margin-top:14px}
  .note{font-size:12px;color:var(--dim2);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">BLACK OUT · 부동산</div>
  <h1>모텔 임대 수익 계산기</h1>
  <div class="sub">변수를 조절하면 실시간으로 계산됩니다 · 모든 금액은 인게임 재화</div>

  <div class="calc">
    <div class="calc-grid">
      <!-- 입력 -->
      <div>
        <div class="field">
          <label>객실 수 <span class="cur" id="v_rooms">2개</span></label>
          <input type="range" id="rooms" min="1" max="32" step="1" value="2" oninput="calc()">
        </div>
        <div class="field">
          <label>객실당 월 갱신비</label>
          <input type="number" id="cost" value="20000000" step="1000000" oninput="calc()">
        </div>
        <div class="field">
          <label>1일(1박) 기준가 <span class="cur" id="v_base"></span></label>
          <input type="range" id="base" min="200000" max="3000000" step="50000" value="1000000" oninput="calc()">
          <input type="number" id="baseNum" value="1000000" step="50000" oninput="syncBase()" style="margin-top:8px">
        </div>
        <div class="field">
          <label>예약율 (30일 중 임대된 비율) <span class="cur" id="v_occ">90%</span></label>
          <input type="range" id="occ" min="20" max="100" step="5" value="90" oninput="calc()">
        </div>
        <div class="field">
          <label>장기 할인폭 (%/일)</label>
          <table style="font-size:13px;width:100%">
            <tr><td style="color:var(--dim)">7일</td><td><input type="number" id="d7" value="5" min="0" max="90" style="width:74px;padding:7px" oninput="calc()"> %</td>
                <td style="color:var(--dim)">15일</td><td><input type="number" id="d15" value="10" min="0" max="90" style="width:74px;padding:7px" oninput="calc()"> %</td></tr>
            <tr><td style="color:var(--dim)">30일</td><td><input type="number" id="d30" value="15" min="0" max="90" style="width:74px;padding:7px" oninput="calc()"> %</td>
                <td colspan="2" class="note" style="border:0">5%씩 = 7/10/15</td></tr>
          </table>
        </div>
        <div class="field">
          <label>월 매출 기준 주력 상품</label>
          <div class="seg" id="primarySeg">
            <button data-t="1" onclick="setPrimary(1)">1일</button>
            <button data-t="7" onclick="setPrimary(7)">7일</button>
            <button data-t="15" onclick="setPrimary(15)">15일</button>
            <button data-t="30" class="on" onclick="setPrimary(30)">30일</button>
          </div>
        </div>
      </div>

      <!-- 출력 -->
      <div>
        <div class="out">
          <div class="big"><span class="lab">패키지 월 순이익 (전체 객실)</span><span class="num" id="o_net">-</span></div>
          <div class="row"><span class="lab">월 매출</span><span id="o_rev">-</span></div>
          <div class="row"><span class="lab">월 고정비</span><span id="o_cost">-</span></div>
          <div class="row"><span class="lab">마진율</span><span id="o_margin">-</span></div>
          <div class="row"><span class="lab">객실당 월 순이익</span><span id="o_perroom">-</span></div>
          <div class="row"><span class="lab">손익분기 하루요금 (현 예약율)</span><span id="o_be">-</span></div>
        </div>

        <table class="pricelist" id="pricelist">
          <thead><tr><th>상품</th><th>판매가</th><th>하루실효</th><th>할인</th></tr></thead>
          <tbody></tbody>
        </table>

        <div class="subpanel">
          <div class="h">시간당 모델 (보조 수익)</div>
          <div class="inline2">
            <div class="field" style="margin:0"><label>시간당 요금</label><input type="number" id="hourly" value="80000" step="5000" oninput="calc()"></div>
            <div class="field" style="margin:0"><label>일 점유시간 <span class="cur" id="v_hrs">8h</span></label><input type="range" id="hrs" min="1" max="24" step="1" value="8" oninput="calc()"></div>
          </div>
          <div class="out" style="margin:12px 0 0">
            <div class="row" style="border:0"><span class="lab">시간당 월 순이익 (객실당)</span><span id="o_hnet">-</span></div>
            <div class="row"><span class="lab">손익분기 시급 (현 점유)</span><span id="o_hbe">-</span></div>
          </div>
        </div>

        <div class="reverse">
          <label style="display:block;font-size:13px;color:var(--dim);margin-bottom:6px">🎯 목표 월 순이익 → 필요한 1일 기준가</label>
          <input type="number" id="target" value="10000000" step="1000000" style="width:100%;padding:10px;border-radius:9px;border:1px solid var(--line);background:#0e0d12;color:var(--tx)" oninput="calc()">
          <div style="display:flex;justify-content:space-between;margin-top:10px;align-items:baseline">
            <span style="color:var(--dim);font-size:13px">필요한 1일 기준가</span>
            <span style="font-family:'Black Han Sans';font-size:24px;color:var(--gold)" id="o_reqbase">-</span>
          </div>
          <div class="note" id="o_reqnote"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const won=(n)=>'₩'+Math.round(n).toLocaleString('ko-KR');
  const man=(n)=>{n=Math.round(n);if(Math.abs(n)>=1e8)return(n/1e8).toFixed(2).replace(/\.?0+$/,'')+'억';if(Math.abs(n)>=1e4)return Math.round(n/1e4).toLocaleString('ko-KR')+'만';return n.toLocaleString('ko-KR');};
  const $=(id)=>document.getElementById(id);
  let primary=30;
  const tierPrice=(base,days,disc)=>base*days*(1-disc/100);
  function setPrimary(t){primary=t;document.querySelectorAll('#primarySeg button').forEach(b=>b.classList.toggle('on',+b.dataset.t===t));calc();}
  function syncBase(){$('base').value=$('baseNum').value;calc();}

  function calc(){
    const rooms=+$('rooms').value, cost=+$('cost').value;
    let base=+$('base').value;
    if(document.activeElement&&document.activeElement.id==='baseNum')base=+$('baseNum').value; else $('baseNum').value=base;
    const occ=+$('occ').value/100;
    const d={1:0,7:+$('d7').value,15:+$('d15').value,30:+$('d30').value};

    $('v_rooms').textContent=rooms+'개'; $('v_base').textContent=man(base)+'원'; $('v_occ').textContent=Math.round(occ*100)+'%';

    // 가격표
    const tiers=[{l:'1시간',days:null},{l:'1일 (1박)',days:1},{l:'7일',days:7},{l:'15일',days:15},{l:'30일',days:30}];
    let rows='';
    tiers.forEach(t=>{
      if(t.days===null){ rows+='<tr><td class="tier">1시간</td><td>'+won(base/24)+'</td><td class="hrs">연속환산</td><td class="hrs">—</td></tr>'; return; }
      const disc=d[t.days]||0, price=tierPrice(base,t.days,disc), perday=price/t.days, isP=t.days===primary;
      rows+='<tr class="'+(isP?'primary':'')+'"><td class="tier">'+t.l+(isP?'<span class="badge">주력</span>':'')+'</td><td>'+won(price)+'</td><td>'+won(perday)+'</td><td>'+(disc?('-'+disc+'%'):'—')+'</td></tr>';
    });
    $('pricelist').querySelector('tbody').innerHTML=rows;

    // 패키지 손익
    const primaryPerday=tierPrice(base,primary,d[primary]||0)/primary;
    const revenue=primaryPerday*30*occ*rooms, totalCost=cost*rooms, net=revenue-totalCost;
    const margin=revenue>0?net/revenue*100:0, perRoom=net/rooms, beDaily=cost/(30*occ);
    $('o_rev').textContent=won(revenue)+'  ('+man(revenue)+')';
    $('o_cost').textContent='-'+won(totalCost);
    $('o_net').textContent=(net>=0?'+':'')+man(net)+'원'; $('o_net').className='num '+(net>=0?'pos':'neg');
    $('o_margin').textContent=margin.toFixed(1)+'%'; $('o_margin').className=margin>=0?'pos':'neg';
    $('o_perroom').textContent=(perRoom>=0?'+':'')+won(perRoom); $('o_perroom').className=perRoom>=0?'pos':'neg';
    $('o_be').textContent=won(beDaily)+' / 일';

    // 시간당
    const H=+$('hourly').value, hrs=+$('hrs').value;
    $('v_hrs').textContent=hrs+'h';
    const hNet=H*hrs*30-cost, hBe=cost/(hrs*30);
    $('o_hnet').textContent=(hNet>=0?'+':'')+man(hNet)+'원'; $('o_hnet').className=hNet>=0?'pos':'neg';
    $('o_hbe').textContent=won(hBe)+' / 시간';

    // 역산
    const target=+$('target').value, discFactor=1-(d[primary]||0)/100;
    const reqBase=(target+totalCost)/(30*occ*rooms*discFactor);
    $('o_reqbase').textContent=won(reqBase);
    $('o_reqnote').textContent='주력='+primary+'일 · 예약율 '+Math.round(occ*100)+'% · 객실 '+rooms+'개 → 목표 '+man(target)+'원 달성.';
  }
  calc();
</script>
</body>
</html>
